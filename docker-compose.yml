version: "3.8"

# ============================================================================
# OpenClaw Testing Platform — Docker Compose
# ============================================================================
# Services:
#   vector-service — Rust vector search microservice (TF-IDF + cosine similarity)
#   audit-service  — Rust audit trail microservice (SHA-256 hash chains)
#   ruvector-db    — RuVector PostgreSQL (vector DB with HNSW+GNN indexing)
#   ruvector-ui    — pgAdmin web UI for managing the vector database
#   ruvector-server — Standalone RuVector server (HNSW + GNN + SONA)
#   grafana        — Monitoring dashboards for vector collections & health
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # Rust Vector Search Service
  # --------------------------------------------------------------------------
  # SIMD-accelerated TF-IDF embedding + cosine similarity search.
  # Replaces the JS brute-force fallback in lib/vector-memory.js.
  # --------------------------------------------------------------------------
  vector-service:
    build:
      context: ./services/vector-service
      dockerfile: Dockerfile
    container_name: openclaw-vector-service
    restart: unless-stopped
    environment:
      VECTOR_PORT: 4001
      VECTOR_DIMENSIONS: ${RUVECTOR_DIMENSIONS:-384}
      VECTOR_MAX_LEARNINGS: 5000
      VECTOR_MAX_DECISIONS: 2000
      VECTOR_MAX_PATTERNS: 3000
      RUST_LOG: info
    ports:
      - "${VECTOR_SERVICE_PORT:-4001}:4001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - openclaw-net

  # --------------------------------------------------------------------------
  # Rust Audit Trail Service
  # --------------------------------------------------------------------------
  # SHA-256 hash-chained immutable event log with batch verification.
  # Replaces the JS implementation in lib/audit-trail.js.
  # --------------------------------------------------------------------------
  audit-service:
    build:
      context: ./services/audit-service
      dockerfile: Dockerfile
    container_name: openclaw-audit-service
    restart: unless-stopped
    environment:
      AUDIT_PORT: 4002
      AUDIT_MAX_MEMORY_EVENTS: 2000
      AUDIT_MAX_FILE_EVENTS: 10000
      AUDIT_FLUSH_INTERVAL_SECS: 60
      AUDIT_PERSIST_DIR: /data/memory
      RUST_LOG: info
    ports:
      - "${AUDIT_SERVICE_PORT:-4002}:4002"
    volumes:
      - ./config/ordertu-qa/memory:/data/memory
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4002/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - openclaw-net

  # --------------------------------------------------------------------------
  # RuVector PostgreSQL — Vector Database
  # --------------------------------------------------------------------------
  # Extends PostgreSQL with 65+ vector/graph/GNN functions.
  # Drop-in pgvector replacement with SIMD acceleration.
  # https://hub.docker.com/r/ruvnet/ruvector-postgres
  # --------------------------------------------------------------------------
  ruvector-db:
    image: ruvnet/ruvector-postgres:latest
    container_name: openclaw-ruvector-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${RUVECTOR_DB_USER:-ruvector}
      POSTGRES_PASSWORD: ${RUVECTOR_DB_PASSWORD:-ruvector_secret}
      POSTGRES_DB: ${RUVECTOR_DB_NAME:-openclaw_vectors}
    ports:
      - "${RUVECTOR_DB_PORT:-5433}:5432"
    volumes:
      - ruvector-data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RUVECTOR_DB_USER:-ruvector} -d ${RUVECTOR_DB_NAME:-openclaw_vectors}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - openclaw-net

  # --------------------------------------------------------------------------
  # pgAdmin — Web UI for RuVector/PostgreSQL Management
  # --------------------------------------------------------------------------
  # Browse tables, run SQL queries, inspect vector collections, view indexes.
  # Access at http://localhost:5050
  # --------------------------------------------------------------------------
  ruvector-ui:
    image: dpage/pgadmin4:latest
    container_name: openclaw-ruvector-ui
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@openclaw.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "${PGADMIN_PORT:-5050}:5050"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./docker/pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      ruvector-db:
        condition: service_healthy
    networks:
      - openclaw-net

  # --------------------------------------------------------------------------
  # RuVector Standalone — Full RuVector Server (HNSW + GNN + SONA)
  # --------------------------------------------------------------------------
  # Native RuVector server for Node.js NAPI-RS clients.
  # The app's lib/vector-memory.js can connect to this instead of in-process.
  # https://hub.docker.com/r/ruvnet/ruvector
  # --------------------------------------------------------------------------
  ruvector-server:
    image: ruvnet/ruvector:latest
    container_name: openclaw-ruvector-server
    restart: unless-stopped
    environment:
      RUVECTOR_DIMENSIONS: ${RUVECTOR_DIMENSIONS:-384}
      RUVECTOR_PORT: 8080
    ports:
      - "${RUVECTOR_SERVER_PORT:-8080}:8080"
    volumes:
      - ruvector-index-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - openclaw-net

  # --------------------------------------------------------------------------
  # Grafana — Monitoring & Visualization Dashboards
  # --------------------------------------------------------------------------
  # Pre-provisioned with RuVector PostgreSQL datasource and dashboards
  # for vector collection stats, health monitoring, and search analytics.
  # Access at http://localhost:3001
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: openclaw-grafana
    restart: unless-stopped
    environment:
      # ── Auth & Access ──
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      # ── Server ──
      GF_SERVER_HTTP_PORT: 3001
      GF_SERVER_ROOT_URL: "http://localhost:${GRAFANA_PORT:-3001}"
      # ── Branding ──
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      # ── Datasource (injected into provisioning via env) ──
      # These match the ruvector-db service defaults above.
      # The provisioning YAML at docker/grafana/provisioning/datasources/
      # uses these same defaults so everything connects out of the box.
      RUVECTOR_DB_HOST: ruvector-db
      RUVECTOR_DB_PORT_INTERNAL: "5432"
      RUVECTOR_DB_USER: ${RUVECTOR_DB_USER:-ruvector}
      RUVECTOR_DB_PASSWORD: ${RUVECTOR_DB_PASSWORD:-ruvector_secret}
      RUVECTOR_DB_NAME: ${RUVECTOR_DB_NAME:-openclaw_vectors}
    ports:
      - "${GRAFANA_PORT:-3001}:3001"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      ruvector-db:
        condition: service_healthy
    networks:
      - openclaw-net

volumes:
  ruvector-data:
    driver: local
  ruvector-index-data:
    driver: local
  pgadmin-data:
    driver: local
  grafana-data:
    driver: local

networks:
  openclaw-net:
    driver: bridge
