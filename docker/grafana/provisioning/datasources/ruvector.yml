apiVersion: 1

datasources:
  - name: RuVector PostgreSQL
    type: postgres
    access: proxy
    url: ruvector-db:5432
    user: ruvector
    database: openclaw_vectors
    isDefault: true
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1700  # PostgreSQL 17
    secureJsonData:
      # NOTE: Grafana provisioning YAML does not support env variable substitution
      # in secureJsonData. This must match RUVECTOR_DB_PASSWORD in docker-compose.yml.
      # For production, use Grafana's API or UI to set the password instead.
      password: ruvector_secret
    editable: true
